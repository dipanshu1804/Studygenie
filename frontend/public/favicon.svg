<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5fa07d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fb69a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>
  <!-- Book shape -->
  <rect x="20" y="25" width="26" height="50" rx="3" fill="white" opacity="0.95"/>
  <rect x="54" y="25" width="26" height="50" rx="3" fill="white" opacity="0.8"/>
  <!-- Book spine line -->
  <rect x="47" y="25" width="6" height="50" fill="#5fa07d"/>
  <!-- Star/sparkle on right page -->
  <circle cx="67" cy="45" r="3" fill="#5fa07d"/>
  <line x1="67" y1="38" x2="67" y2="40" stroke="#5fa07d" stroke-width="2" stroke-linecap="round"/>
  <line x1="67" y1="50" x2="67" y2="52" stroke="#5fa07d" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="45" x2="62" y2="45" stroke="#5fa07d" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="45" x2="74" y2="45" stroke="#5fa07d" stroke-width="2" stroke-linecap="round"/>
  <!-- Lines on left page representing text -->
  <rect x="25" y="35" width="16" height="2.5" rx="1" fill="#5fa07d" opacity="0.6"/>
  <rect x="25" y="41" width="13" height="2.5" rx="1" fill="#5fa07d" opacity="0.6"/>
  <rect x="25" y="47" width="16" height="2.5" rx="1" fill="#5fa07d" opacity="0.6"/>
  <rect x="25" y="53" width="11" height="2.5" rx="1" fill="#5fa07d" opacity="0.6"/>
  <rect x="25" y="59" width="14" height="2.5" rx="1" fill="#5fa07d" opacity="0.6"/>
</svg>
